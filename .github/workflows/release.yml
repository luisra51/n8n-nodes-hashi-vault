name: Release to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "Tag v$TAG_VERSION matches package.json version"

      - name: Lint n8n node structure
        run: |
          npm install --no-save --no-audit --no-fund eslint-plugin-n8n-nodes-base
          cat > .eslintrc.n8n.cjs <<'EOF'
          module.exports = {
            root: true,
            parser: '@typescript-eslint/parser',
            parserOptions: { ecmaVersion: 2020, sourceType: 'module' },
            plugins: ['n8n-nodes-base'],
            extends: [
              'plugin:n8n-nodes-base/community',
              'plugin:n8n-nodes-base/credentials',
              'plugin:n8n-nodes-base/nodes',
            ],
          };
          EOF
          npx eslint --no-eslintrc -c .eslintrc.n8n.cjs 'credentials/**/*.ts' 'nodes/**/*.ts' package.json

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
